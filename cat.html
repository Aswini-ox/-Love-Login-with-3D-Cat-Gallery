<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Login 💕</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fcb69f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Floating Hearts Background */
    .heart {
      position: absolute;
      color: rgba(255, 255, 255, 0.7);
      font-size: 20px;
      animation: floatUp 8s linear infinite;
    }
    @keyframes floatUp {
      from { transform: translateY(100vh) scale(0.5); opacity: 1; }
      to { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* Login Box */
    .login-box {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(255, 0, 100, 0.3);
      text-align: center;
      width: 320px;
      animation: fadeIn 1.2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: #ff4d6d;
      font-size: 28px;
      font-weight: bold;
    }
    .login-box input {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: 2px solid #ffb6c1;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }
    .login-box input:focus {
      border-color: #ff4d6d;
      box-shadow: 0 0 10px #ff4d6d;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #ff4d6d, #ff85a1);
      border: none;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .login-box button:hover {
      background: linear-gradient(90deg, #ff2e63, #ff6f91);
      transform: scale(1.05);
    }

    /* Gallery Section */
    .gallery-container {
      display: none;
      perspective: 1000px;
      width: 100%;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #111;
    }
    .gallery {
      width: 320px;
      height: 320px;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 15s infinite linear;
    }
    .gallery img {
      position: absolute;
      width: 280px;
      height: 200px;
      left: 20px;
      top: 60px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
  </style>
</head>
<body>
     

  <!-- Floating Hearts -->
  <script>
    for(let i=0; i<20; i++) {
      let heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (20 + Math.random() * 30) + "px";
      heart.style.animationDuration = (5 + Math.random() * 5) + "s";
      document.body.appendChild(heart);
    }
  </script>

  <!-- Login Box -->
  <div class="login-box" id="loginBox">
    <h2> CAT WORLD 💖</h2>
    <input type="text" id="username" placeholder="Enter Your Name">
    <input type="password" id="password" placeholder="Enter Secret Code">
    <button onclick="login()">💌 Enter</button>
  </div>

  <!-- Gallery Section -->
  <div class="gallery-container" id="galleryContainer">
    <div class="gallery">
      <img src="cat2.jpeg" style="transform: rotateY(0deg) translateZ(400px);">
      <img src="cat3.jpeg" style="transform: rotateY(72deg) translateZ(400px);">
      <img src="cat4.jpeg" style="transform: rotateY(144deg) translateZ(400px);">
      <img src="cat5.jpeg" style="transform: rotateY(216deg) translateZ(400px);">
      <img src="cat6.jpeg" style="transform: rotateY(288deg) translateZ(400px);">
    </div>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if(username === "myLove" && password === "forever") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("galleryContainer").style.display = "flex";
      } else {
        alert("💔 Wrong code! Try Username: myLove | Password: CAT");
      }
    }
  </script>
</body>
</html>
